<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Tic-Tac-Toe</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1 class="auth-title">Tic-Tac-Toe</h1>
    <p class="auth-sub">Sign in to play &amp; track your score</p>

    {% if form.errors %}
      <p class="form-error">Invalid username or password.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primary full-width">Sign in</button>
    </form>

    <p class="auth-footer">No account? <a href="/register/">Register</a></p>
  </div>
</body>
</html>
