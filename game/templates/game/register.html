<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Tic-Tac-Toe</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Pick a username and start playing</p>

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-group">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <p class="form-error">{{ field.errors|join:", " }}</p>
          {% endif %}
          {% if field.help_text %}
            <p class="form-help">{{ field.help_text }}</p>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn-primary full-width">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="/login/">Sign in</a></p>
  </div>
</body>
</html>
