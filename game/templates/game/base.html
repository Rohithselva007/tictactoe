<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Tic-Tac-Toe{% endblock %}</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --x-color: #534AB7;
  --x-bg: #EEEDFE;
  --x-border: #AFA9EC;
  --o-color: #0F6E56;
  --o-bg: #E1F5EE;
  --o-border: #5DCAA5;
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface-2: #f0efe9;
  --border: rgba(0,0,0,0.1);
  --border-hover: rgba(0,0,0,0.2);
  --text: #1a1a18;
  --text-muted: #6b6b67;
  --radius-md: 8px;
  --radius-lg: 14px;
  --nav-h: 52px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --x-color: #AFA9EC;
    --x-bg: #26215C;
    --x-border: #534AB7;
    --o-color: #5DCAA5;
    --o-bg: #04342C;
    --o-border: #0F6E56;
    --bg: #1a1a18;
    --surface: #242422;
    --surface-2: #2e2e2b;
    --border: rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.22);
    --text: #f0efe9;
    --text-muted: #9a9a94;
  }
}

body {
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  color: var(--text);
  min-height: 100dvh;
}

a { color: var(--x-color); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Navbar ────────────────────────────────────────────────── */
.navbar {
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.25rem;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface);
}

.nav-brand {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--x-color);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  font-size: 14px;
  color: var(--text-muted);
}

.nav-links a { color: var(--text-muted); }
.nav-links a:hover { color: var(--text); text-decoration: none; }
.nav-user { font-weight: 500; color: var(--text); }

.btn-link {
  background: none;
  border: none;
  font: inherit;
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 0;
}
.btn-link:hover { color: var(--text); }

/* ── Page layout ───────────────────────────────────────────── */
.page-main {
  display: flex;
  justify-content: center;
  padding: 2rem 1rem;
}

/* ── Auth pages ────────────────────────────────────────────── */
.auth-body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 1.5rem;
}

.auth-card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2rem;
}

.auth-title {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 4px;
}

.auth-sub {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
}

.auth-footer {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 1.25rem;
}

.form-group {
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.form-group input {
  width: 100%;
  padding: 9px 12px;
  border: 0.5px solid var(--border-hover);
  border-radius: var(--radius-md);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}

.form-group input:focus {
  border-color: var(--x-color);
}

.form-error {
  font-size: 12px;
  color: #D85A30;
  margin-top: 4px;
}

.form-help {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  line-height: 1.5;
}

/* ── Buttons ───────────────────────────────────────────────── */
.btn-primary {
  display: inline-block;
  padding: 10px 22px;
  background: var(--x-color);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  transition: opacity 0.15s;
  text-decoration: none;
}
.btn-primary:hover { opacity: 0.88; text-decoration: none; color: #fff; }
.full-width { width: 100%; }

/* ── Game board ────────────────────────────────────────────── */
.game-wrap {
  width: 100%;
  max-width: 420px;
}

.difficulty-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 1.25rem;
}

.diff-btn {
  padding: 6px 18px;
  border-radius: 999px;
  font-size: 13px;
  border: 0.5px solid var(--border-hover);
  color: var(--text-muted);
  background: var(--surface);
  transition: all 0.15s;
}
.diff-btn:hover { text-decoration: none; color: var(--text); }
.diff-btn.active {
  background: var(--x-color);
  border-color: var(--x-color);
  color: #fff;
}

.scoreboard {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.5rem;
}

.score-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px;
  text-align: center;
}

.score-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.score-val {
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
}

.x-card .score-val { color: var(--x-color); }
.o-card .score-val { color: var(--o-color); }

.turn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 0.75rem;
}

.pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border-hover);
  transition: background 0.2s, transform 0.2s;
}
.pip.active-x { background: var(--x-color); transform: scale(1.4); }
.pip.active-o { background: var(--o-color); transform: scale(1.4); }

#turn-text {
  font-size: 13px;
  color: var(--text-muted);
  min-width: 80px;
  text-align: center;
}

#status {
  text-align: center;
  font-size: 16px;
  font-weight: 500;
  min-height: 28px;
  margin-bottom: 1rem;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 1.25rem;
}

.cell {
  aspect-ratio: 1;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(2rem, 8vw, 2.75rem);
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  user-select: none;
}

.cell:hover:not(.taken) {
  background: var(--surface-2);
  border-color: var(--border-hover);
}
.cell:active:not(.taken) { transform: scale(0.95); }
.cell.taken { cursor: default; }

.mark {
  display: inline-block;
  animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
  from { transform: scale(0) rotate(-12deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}

.mark-x { color: var(--x-color); }
.mark-o { color: var(--o-color); }

.cell.winning-cell.has-x { background: var(--x-bg); border-color: var(--x-border); }
.cell.winning-cell.has-o { background: var(--o-bg); border-color: var(--o-border); }

.actions { display: flex; justify-content: center; }

/* ── Tables (leaderboard / history) ────────────────────────── */
.page-wrap { width: 100%; max-width: 680px; }

.page-title {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 1.25rem;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.data-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 12px;
  border-bottom: 0.5px solid var(--border);
}

.data-table td {
  padding: 12px 12px;
  border-bottom: 0.5px solid var(--border);
  vertical-align: middle;
}

.data-table tr:last-child td { border-bottom: none; }
.highlight-row td { background: var(--x-bg); }

.rank { color: var(--text-muted); font-size: 13px; }
.val-win { color: var(--x-color); font-weight: 500; }
.val-loss { color: var(--o-color); font-weight: 500; }
.muted { color: var(--text-muted); }
.empty-row { text-align: center; color: var(--text-muted); padding: 2rem; }

.bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

.bar {
  height: 6px;
  background: var(--x-color);
  border-radius: 999px;
  min-width: 2px;
  transition: width 0.4s;
}

/* Badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
}
.badge-win  { background: var(--x-bg);  color: var(--x-color); }
.badge-loss { background: var(--o-bg);  color: var(--o-color); }
.badge-draw { background: var(--surface-2); color: var(--text-muted); }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">TTT</span>
    {% if user.is_authenticated %}
      <div class="nav-links">
        <a href="/">New Game</a>
        <a href="/leaderboard/">Leaderboard</a>
        <a href="/history/">History</a>
        <span class="nav-user">{{ user.username }}</span>
        <form method="post" action="/logout/" style="display:inline">
          {% csrf_token %}
          <button type="submit" class="btn-link">Logout</button>
        </form>
      </div>
    {% endif %}
  </nav>

  <main class="page-main">
    {% block content %}{% endblock %}
  </main>

  <script>
document.addEventListener('DOMContentLoaded', () => {
  const boardEl = document.getElementById('board');
  if (!boardEl) return;

  const sessionId = window.SESSION_ID;
  const csrfToken = window.CSRF_TOKEN;

  let board = Array(9).fill(null);
  let gameOver = false;
  let waitingForAI = false;

  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function findWinLine(board) {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[b] === board[c]) {
        return [a,b,c];
      }
    }
    return [];
  }

  function renderBoard(winLine = []) {
    const cells = boardEl.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.className = 'cell';
      cell.innerHTML = '';
      if (board[i]) {
        cell.classList.add('taken');
        if (winLine.includes(i)) {
          cell.classList.add('winning-cell', `has-${board[i].toLowerCase()}`);
        }
        const mark = document.createElement('span');
        mark.className = `mark mark-${board[i].toLowerCase()}`;
        mark.textContent = board[i];
        cell.appendChild(mark);
      }
    });
  }

  function setPips(activePlayer) {
    const pipX = document.getElementById('pip-x');
    const pipO = document.getElementById('pip-o');
    const turnText = document.getElementById('turn-text');
    if (!pipX) return;
    pipX.className = 'pip' + (activePlayer === 'X' ? ' active-x' : '');
    pipO.className = 'pip' + (activePlayer === 'O' ? ' active-o' : '');
    turnText.textContent = activePlayer === 'X' ? 'Your turn' : 'AI thinking…';
  }

  function setStatus(result) {
    const el = document.getElementById('status');
    if (!el) return;
    if (!result || result === 'in_progress') { el.textContent = ''; el.style.color = ''; return; }
    const map = {
      player_win: { text: 'You win! 🎉', color: 'var(--x-color)' },
      ai_win:     { text: 'AI wins.',    color: 'var(--o-color)' },
      draw:       { text: "It's a draw.", color: '' },
    };
    const s = map[result] || {};
    el.textContent = s.text || '';
    el.style.color = s.color || '';
  }

  async function handleCellClick(idx) {
    if (gameOver || waitingForAI || board[idx]) return;

    board[idx] = 'X';
    renderBoard();
    setPips('O');
    waitingForAI = true;

    try {
      const res = await fetch(`/api/move/${sessionId}/`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken,
        },
        body: JSON.stringify({ index: idx }),
      });

      const data = await res.json();
      if (!res.ok) { console.error(data.error); waitingForAI = false; return; }

      board = data.board;

      if (data.result !== 'in_progress') {
        gameOver = true;
        const winLine = findWinLine(board);
        renderBoard(winLine);
        setStatus(data.result);
        setPips(null);
      } else {
        renderBoard();
        setPips('X');
        setStatus(null);
      }
    } catch (err) {
      console.error('Network error:', err);
    } finally {
      waitingForAI = false;
    }
  }

  boardEl.addEventListener('click', e => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const idx = parseInt(cell.dataset.index, 10);
    handleCellClick(idx);
  });

  setPips('X');
});
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
